<div class="auth-shell login-shell">
  <div class="auth-background">
    <div class="auth-orb auth-orb-blue"></div>
    <div class="auth-orb auth-orb-amber"></div>
  </div>

  <mat-card class="auth-card login-card">
    <div class="auth-brand">
      <div class="brand-mark">
        <span class="mark-blue"></span>
        <span class="mark-green"></span>
        <span class="mark-yellow"></span>
      </div>
      <div class="brand-copy">
        <span class="brand-title">Video Meet</span>
        <span class="brand-subtitle">Secure meetings for your team</span>
      </div>
    </div>

    <mat-card-header class="auth-header">
      <mat-card-title>
        <h1>Welcome Back</h1>
      </mat-card-title>
      <mat-card-subtitle>Sign in to continue</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="auth-content">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <input
            matInput
            type="email"
            formControlName="email"
            placeholder="Enter your email"
            autocomplete="email">
          <mat-icon matPrefix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.invalid">
            {{ getErrorMessage('email') }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input
            matInput
            [type]="hidePassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password">
          <mat-icon matPrefix>lock</mat-icon>
          <button
            mat-icon-button
            matSuffix
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="'Hide password'"
            [attr.aria-pressed]="hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.invalid">
            {{ getErrorMessage('password') }}
          </mat-error>
        </mat-form-field>

        <div *ngIf="errorMessage" class="error-message">
          <mat-icon>error</mat-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width primary-submit"
          [disabled]="loading || loginForm.invalid">
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
          <span *ngIf="!loading">Sign In</span>
        </button>

        <div class="auth-link">
          <span>Don't have an account?</span>
          <a routerLink="/register">Create Account</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
