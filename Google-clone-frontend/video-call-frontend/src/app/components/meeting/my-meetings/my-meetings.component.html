<div class="landing-shell">
  <header class="topbar">
    <div class="header-left">
      <div class="brand-mark">
        <span class="mark-blue"></span>
        <span class="mark-green"></span>
        <span class="mark-yellow"></span>
      </div>
      <div class="brand-copy">
        <span class="brand-title">Video Meet</span>
        <span class="brand-subtitle">Fast meetings for your team</span>
      </div>
    </div>

    <div class="header-center"></div>

    <div class="header-right">
      <span class="header-time">{{ currentDateTimeLabel }}</span>
      <!-- <span class="welcome-copy">{{ currentUserName }}</span> -->
      <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Account menu" class="profile-trigger">
        <ng-container *ngIf="currentUserProfileImageUrl; else defaultHeaderAvatar">
          <img [src]="currentUserProfileImageUrl" [alt]="currentUserName" class="header-avatar-image">
        </ng-container>
        <ng-template #defaultHeaderAvatar>
          <span class="header-avatar-fallback">{{ currentUserInitial }}</span>
        </ng-template>
      </button>
    </div>
  </header>

  <div class="landing-body">
    <aside class="nav-rail">
      <button class="rail-link active" type="button">
        <mat-icon>video_camera_front</mat-icon>
        <span>Meetings</span>
      </button>
      <button class="rail-link" type="button">
        <mat-icon>call</mat-icon>
        <span>Calls</span>
      </button>
    </aside>

    <main class="hero-container">
      <section class="hero-copy">
        <p class="eyebrow">Meet from anywhere</p>
        <h1>Video calls and meetings for everyone.</h1>
        <p class="hero-text">
          Connect, collaborate, and celebrate from anywhere with Google Meet
        </p>

        <div class="action-row">
          <button mat-flat-button color="primary" class="primary-action" (click)="openStartMeetingModal()">
            <mat-icon>video_call</mat-icon>
            <span>Start a New Meeting</span>
          </button>

          <button mat-stroked-button class="secondary-action" (click)="openJoinMeetingModal()" [disabled]="joinLoading">
            <mat-spinner *ngIf="joinLoading" diameter="18"></mat-spinner>
            <mat-icon *ngIf="!joinLoading">keyboard</mat-icon>
            <span>{{ joinLoading ? 'Joining...' : 'Join Meeting' }}</span>
          </button>
        </div>

        <p class="error-copy" *ngIf="errorMessage">{{ errorMessage }}</p>

        <div class="hero-divider"></div>
      </section>

      <section class="hero-visual">
        <div class="visual-card">
          <div class="visual-stage">
            <div class="floating-pill">Share link instantly</div>
            <div class="visual-illustration">
              <div class="meeting-window large-window">
                <div class="window-header">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
                <div class="window-body">
                  <div class="avatar-circle host-avatar"></div>
                  <div class="avatar-circle guest-avatar"></div>
                  <div class="code-chip">ROOM • CODE</div>
                </div>
              </div>
              <div class="meeting-window small-window"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
</div>

<mat-menu #menu="matMenu">
  <button mat-menu-item (click)="openProfileSettings()">
    <mat-icon>manage_accounts</mat-icon>
    <span>Profile settings</span>
  </button>
  <button mat-menu-item (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>Logout</span>
  </button>
</mat-menu>
